spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/barbearia_db}
    # Credenciais via variável de ambiente. Fallback para valores locais.
    # Em produção: defina DB_USERNAME e DB_PASSWORD no servidor, nunca no código.
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:Controle1@}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: brb

logging:
  level:
    # DEBUG do Spring Security gera muitos logs — use INFO em produção
    org.springframework.security: INFO
